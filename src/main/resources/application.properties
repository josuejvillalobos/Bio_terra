spring.jpa.open-in-view=false

# ── APPLICATION ─────────────────────────────────────────
spring.application.name=bioterra-backend
spring.profiles.active=dev

# ── DATABASE (dev: H2 in-memory) ────────────────────────
spring.datasource.url=jdbc:h2:mem:bioterra;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 CONSOLE ──────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ─────────────────────────────────────────────────
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── FLYWAY ──────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── SECURITY (dev: basic auth placeholder) ──────────────
spring.security.user.name=admin
spring.security.user.password=admin

# ── SERVER ──────────────────────────────────────────────
server.port=8080

# ── LOGGING ─────────────────────────────────────────────
logging.level.com.bioterra=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.flywaydb=INFO

# ── OPENAPI / SWAGGER ───────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ── SCHEDULER ───────────────────────────────────────────
bioterra.scheduler.interval-ms=300000
bioterra.open-meteo.base-url=https://api.open-meteo.com/v1/forecast